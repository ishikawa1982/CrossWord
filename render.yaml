services:
  - type: web
    name: crossword
    runtime: node
    plan: free
    # 依存インストール → クライアントをビルド（client/dist 生成）
    buildCommand: npm install && npm run build -w client
    # サーバ起動（client/dist を同一オリジンで配信し、Socket.IO も同じポートで受ける）
    startCommand: npm run start -w server
    envVars:
      - key: NODE_VERSION
        value: 22
    # 無料プランは15分無操作でスリープします。
    # 最初のアクセス時に起動まで30秒ほどかかる場合があります。
